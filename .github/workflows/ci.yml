name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint (vue-tsc -b)
        run: bun run lint
      - name: Test (bun test)
        run: bun test
      - name: Vite build
        run: bunx vite build
      # NOTE: cross-platform `electrobun build` matrix lands as a follow-up;
      # this job validates the Vue bundle on Linux only.
