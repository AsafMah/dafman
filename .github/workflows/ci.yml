name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel duplicate runs on the same branch / PR — a force-push during CI
# kills the prior run rather than wasting both.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal token permissions per GitHub Actions hardening guidance.
permissions:
  contents: read

jobs:
  # ── Tier-1: parallel gate jobs mirroring `bun run check` ─────────────
  #
  # Previously this was a single `check` job that ran lint + test + smoke
  # + e2e serially and missed three lint commands. Now split so each can
  # fail fast and we get a real CI gate matching the local `bun run check`.

  lint:
    name: Lint (vue-tsc + bun-entry + tsc-bun + eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: vue-tsc (renderer types)
        run: bun run lint
      - name: bun-entry reachability check
        run: bun run lint:bun
      - name: tsc (backend types)
        run: bun run lint:tsc-bun
      - name: ESLint (renderer + backend)
        run: bun run lint:eslint

  test:
    name: Unit tests (bun test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: bun test
        run: bun test

  smoke:
    name: Renderer smoke (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Vite build (prod bundle for vite preview)
        run: bunx vite build
      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps
      - name: Renderer smoke
        # Required check — asserts the bundle reaches "ready" without
        # console errors on both prod (`vite preview`) and HMR (`vite dev`)
        # entry points.
        run: bun run smoke:run
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  e2e:
    name: Full E2E (real test-server + fake SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps
      - name: bun e2e:run
        # Real E2E tier — spawns the bun test-server with mocked SDK per
        # test, drives chromium via the WebSocket bridge. Covers @-picker
        # happy + path-nav + `.` trigger, toggle persistence across
        # reload, permission flow with audit log assertion.
        run: bun run e2e:run
      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # ── Tier-2: real `electrobun build` per-platform ─────────────────────
  #
  # Catches native bundler regressions (signing, copy steps, dist
  # layout) the Linux smoke can't see. Ubuntu is required for merge;
  # macOS/Windows are continue-on-error for now (transient native-
  # toolchain failures shouldn't block solo work).

  build-matrix:
    name: electrobun build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os != 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Vite build
        run: bunx vite build
      - name: Electrobun build
        # No signing certs in CI; unsigned bundles are fine for
        # regression detection (we're checking bundler completion,
        # not shipping artefacts).
        run: bunx electrobun build
      - name: Upload build artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electrobun-build-${{ matrix.os }}
          path: |
            build/
            dist/
          retention-days: 7
