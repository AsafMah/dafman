name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Tier-1 gate: lint, test, vite build, Playwright renderer smoke.
  # Linux-only because none of these need a real Electrobun bundle.
  check:
    name: Lint + test + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint (vue-tsc)
        run: bun run lint
      - name: Test (bun test)
        run: bun test
      - name: Vite build
        run: bunx vite build
      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps
      - name: Renderer smoke (Playwright)
        # Required check — must pass for the PR to merge. Asserts the
        # bundle reaches "ready" without console errors on both the
        # prod (`vite preview`) and HMR (`vite dev`) entry points.
        run: bun run smoke:run
      - name: Full E2E (Playwright + bun subprocess + fake SDK)
        # Real E2E tier — spawns the bun test-server with mocked
        # Copilot SDK per test, drives chromium via the WebSocket
        # bridge. Covers: @-picker happy + path-nav + `.` trigger,
        # toggle persistence across reload, permission flow with
        # audit log assertion. See plans/plan-e2e.prompt.md.
        run: bun run e2e:run
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # Tier-2 gate: real `electrobun build` per-platform. Catches native
  # bundler regressions (signing, copy steps, dist layout) the Linux
  # smoke can't see. Non-blocking for now (continue-on-error) so a
  # transient native-toolchain failure on macOS/Windows runners doesn't
  # block merges; flip to required once it's been green for a week.
  build-matrix:
    name: electrobun build (${{ matrix.os }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Vite build
        run: bunx vite build
      - name: Electrobun build
        # Electrobun's CLI handles per-OS bundling; we don't pass any
        # signing certs in CI so the macOS step produces an unsigned
        # `.app`. That's fine for a regression-detection smoke — we're
        # checking that the bundler completes, not shipping artefacts.
        run: bunx electrobun build
      - name: Upload build artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electrobun-build-${{ matrix.os }}
          path: |
            build/
            dist/
          retention-days: 7
