name: Stale
on:
  schedule:
    # Daily at 07:00 UTC.
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: stale
  cancel-in-progress: false

jobs:
  stale:
    name: Mark and close stale issues / PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues: 90d idle → stale, 14d more → close.
          days-before-issue-stale: 90
          days-before-issue-close: 14
          stale-issue-label: stale
          stale-issue-message: |
            This issue has been idle for 90 days. Adding `stale`. If it's
            still relevant, drop a comment or remove the label and it
            won't auto-close. Otherwise it closes in 14 days.
          close-issue-message: |
            Auto-closing after 14 days idle on `stale`. Reopen if needed.
          exempt-issue-labels: "prio:p0,blocked,needs-spec,pending-dogfood,security"

          # PRs: 30d idle → stale, 14d more → close.
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: stale
          stale-pr-message: |
            This PR has been idle for 30 days. Adding `stale`. Push,
            rebase, or comment to keep it open; otherwise it closes in
            14 days.
          close-pr-message: |
            Auto-closing after 14 days idle on `stale`. Reopen if needed.
          exempt-pr-labels: "automerge,blocked,security"

          # Don't burn API quota on already-labelled cards.
          operations-per-run: 50
          ascending: true
