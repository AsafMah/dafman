name: Labeler
on:
  # `pull_request_target` runs in the base repo context with write
  # permissions — required so the action can label PRs from forks.
  # We cap `permissions` to the minimum so this can't be abused.
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: labeler-${{ github.ref }}
  cancel-in-progress: true

jobs:
  label:
    name: Apply area labels by changed paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
