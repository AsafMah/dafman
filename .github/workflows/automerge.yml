name: Auto-merge
on:
  pull_request_target:
    types: [labeled, opened, reopened, synchronize]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: automerge-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  automerge:
    name: Squash-merge PRs labelled "automerge" once CI is green
    runs-on: ubuntu-latest
    # Only run for PRs with the `automerge` label (set by Dependabot or
    # manually). The `pull-request-merge-action` waits for all required
    # status checks before merging.
    if: contains(github.event.pull_request.labels.*.name, 'automerge') || github.event_name == 'check_suite'
    steps:
      - uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_LABELS: automerge,!blocked,!stale
          MERGE_METHOD: squash
          MERGE_COMMIT_MESSAGE: pull-request-title
          MERGE_DELETE_BRANCH: true
          MERGE_REQUIRED_APPROVALS: 0
          UPDATE_LABELS: ""
          UPDATE_METHOD: rebase
